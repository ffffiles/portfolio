<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Draw</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #171717;
      overflow: hidden;
      cursor: none;
    }

    canvas {
      position: fixed;
      top: 0;
      left: 0;
      cursor: none;
      display: block;
    }

    #cursor {
      position: fixed;
      top: 0;
      left: 0;
      pointer-events: none;
      z-index: 9999;
      /* Offset so pencil tip (bottom-left of SVG) is at mouse coords */
      transform: translate(-2px, -22px);
    }

    #hint {
      position: fixed;
      bottom: 40px;
      width: 100%;
      text-align: center;
      color: rgba(255, 221, 0, 0.4);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 12px;
      font-weight: 300;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      pointer-events: none;
      animation: fadeHint 4s ease forwards;
    }

    @keyframes fadeHint {
      0%   { opacity: 1; }
      60%  { opacity: 1; }
      100% { opacity: 0; }
    }
  </style>
</head>
<body>

  <canvas id="canvas"></canvas>

  <div id="cursor">
    <!-- Pencil tip SVG, tip at bottom-left corner -->
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <!-- Pencil body (parallelogram going upper-right) -->
      <polygon points="2,22 6,18 20,4 22,6 8,20" fill="#FFDD00"/>
      <!-- Highlight sheen -->
      <line x1="5" y1="19" x2="19" y2="5" stroke="rgba(255,255,255,0.25)" stroke-width="0.8"/>
      <!-- Ferrule (dark band near tip) -->
      <polygon points="2,22 4,20 6,22 4,24" fill="#555"/>
      <!-- Tip point -->
      <polygon points="2,22 4,20 2,24" fill="#c8a800"/>
      <!-- Eraser end cap -->
      <polygon points="20,4 22,6 24,4 22,2" fill="#e8c4c4"/>
      <line x1="20" y1="4" x2="22" y2="6" stroke="#555" stroke-width="1.2"/>
    </svg>
  </div>

  <div id="hint">draw anywhere</div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const cursorEl = document.getElementById('cursor');
    const hintEl = document.getElementById('hint');

    // ── Canvas sizing (DPR-aware) ─────────────────────────────────────────────

    let logicalW = window.innerWidth;
    let logicalH = window.innerHeight;
    const dpr = window.devicePixelRatio || 1;

    function initCanvas() {
      canvas.width = logicalW * dpr;
      canvas.height = logicalH * dpr;
      canvas.style.width = logicalW + 'px';
      canvas.style.height = logicalH + 'px';
      ctx.scale(dpr, dpr);
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      ctx.fillStyle = '#171717';
      ctx.fillRect(0, 0, logicalW, logicalH);
    }

    initCanvas();

    // ── Resize (preserve marks via offscreen snapshot) ────────────────────────

    let resizeTimer;
    window.addEventListener('resize', () => {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(() => {
        // Snapshot current drawing
        const offscreen = document.createElement('canvas');
        offscreen.width = canvas.width;
        offscreen.height = canvas.height;
        offscreen.getContext('2d').drawImage(canvas, 0, 0);

        logicalW = window.innerWidth;
        logicalH = window.innerHeight;

        canvas.width = logicalW * dpr;
        canvas.height = logicalH * dpr;
        canvas.style.width = logicalW + 'px';
        canvas.style.height = logicalH + 'px';

        ctx.scale(dpr, dpr);
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';

        // Restore background
        ctx.fillStyle = '#171717';
        ctx.fillRect(0, 0, logicalW, logicalH);

        // Restore marks (scaled back to logical coords)
        ctx.save();
        ctx.scale(1 / dpr, 1 / dpr);
        ctx.drawImage(offscreen, 0, 0);
        ctx.restore();
      }, 150);
    });

    // ── Hint fade-out ─────────────────────────────────────────────────────────

    hintEl.addEventListener('animationend', () => {
      hintEl.style.display = 'none';
    });

    // ── Drawing state ─────────────────────────────────────────────────────────

    const STRAND_OFFSETS = [-3.2, -1.8, -0.8, 0, 0.9, 2.1, 3.2];
    const SPLINE_STEPS = 8;

    let pointBuffer = [];   // rolling last-4 {x, y}
    let lastX = null;
    let lastY = null;
    let lastVelocity = 0;

    // ── Catmull-Rom spline sampler ────────────────────────────────────────────

    function catmullRom(p0, p1, p2, p3, t) {
      const t2 = t * t;
      const t3 = t2 * t;
      return {
        x: 0.5 * ((2 * p1.x) +
           (-p0.x + p2.x) * t +
           (2 * p0.x - 5 * p1.x + 4 * p2.x - p3.x) * t2 +
           (-p0.x + 3 * p1.x - 3 * p2.x + p3.x) * t3),
        y: 0.5 * ((2 * p1.y) +
           (-p0.y + p2.y) * t +
           (2 * p0.y - 5 * p1.y + 4 * p2.y - p3.y) * t2 +
           (-p0.y + 3 * p1.y - 3 * p2.y + p3.y) * t3),
      };
    }

    // Sample sub-points between p1→p2 using p0 and p3 as tangent guides
    function sampleSpline(p0, p1, p2, p3, steps) {
      const pts = [];
      for (let i = 0; i <= steps; i++) {
        pts.push(catmullRom(p0, p1, p2, p3, i / steps));
      }
      return pts;
    }

    // ── Core pencil stroke renderer ───────────────────────────────────────────

    function drawPencilSegment(subPoints, velocity) {
      if (subPoints.length < 2) return;

      const normVel = Math.min(velocity / 20, 1);
      const baseAlpha = 0.65 - normVel * 0.25;
      const fastSwipe = velocity > 80;
      const strandCount = fastSwipe ? 4 : 7;
      const offsets = fastSwipe ? STRAND_OFFSETS.slice(0, 4) : STRAND_OFFSETS;

      // Compute perpendicular direction from first to last sub-point
      const dx = subPoints[subPoints.length - 1].x - subPoints[0].x;
      const dy = subPoints[subPoints.length - 1].y - subPoints[0].y;
      const len = Math.sqrt(dx * dx + dy * dy) || 1;
      const perpX = -dy / len;
      const perpY =  dx / len;

      // ── Pass 4: soft halo (draw first so strands paint over it) ──────────
      ctx.save();
      ctx.globalAlpha = 0.05;
      ctx.strokeStyle = '#FFDD00';
      ctx.lineWidth = 7;
      ctx.beginPath();
      ctx.moveTo(subPoints[0].x, subPoints[0].y);
      for (let i = 1; i < subPoints.length; i++) {
        ctx.lineTo(subPoints[i].x, subPoints[i].y);
      }
      ctx.stroke();
      ctx.restore();

      // ── Pass 1 & 2: fibrous strands with pressure-aware alpha ─────────────
      for (let s = 0; s < strandCount; s++) {
        const offset = offsets[s];
        const alpha = baseAlpha * (0.3 + Math.random() * 0.4);
        const width = 0.3 + Math.random() * 0.6;

        ctx.save();
        ctx.globalAlpha = alpha;
        ctx.strokeStyle = '#FFDD00';
        ctx.lineWidth = width;
        ctx.beginPath();

        for (let i = 0; i < subPoints.length; i++) {
          const jx = (Math.random() - 0.5) * 1.2;
          const jy = (Math.random() - 0.5) * 1.2;
          const px = subPoints[i].x + perpX * offset + jx;
          const py = subPoints[i].y + perpY * offset + jy;
          if (i === 0) ctx.moveTo(px, py);
          else ctx.lineTo(px, py);
        }

        ctx.stroke();
        ctx.restore();
      }

      // ── Pass 3: graphite speckle ──────────────────────────────────────────
      if (!fastSwipe) {
        ctx.save();
        ctx.fillStyle = '#FFDD00';
        for (let i = 0; i < subPoints.length; i++) {
          if (Math.random() > 0.15) continue;
          ctx.globalAlpha = 0.12 + Math.random() * 0.13;
          const sx = subPoints[i].x + (Math.random() - 0.5) * 8;
          const sy = subPoints[i].y + (Math.random() - 0.5) * 8;
          ctx.fillRect(sx, sy, 1, 1);
        }
        ctx.restore();
      }
    }

    // ── Main draw handler ─────────────────────────────────────────────────────

    function handleDraw(x, y) {
      // Update cursor position (tip = bottom-left of SVG)
      cursorEl.style.left = x + 'px';
      cursorEl.style.top  = y + 'px';

      if (lastX === null) {
        lastX = x;
        lastY = y;
        pointBuffer = [{ x, y }];
        return;
      }

      const dx = x - lastX;
      const dy = y - lastY;
      const velocity = Math.sqrt(dx * dx + dy * dy);
      lastVelocity = velocity;

      // Update rolling point buffer (max 4)
      pointBuffer.push({ x, y });
      if (pointBuffer.length > 4) pointBuffer.shift();

      // Need at least 2 points to draw
      if (pointBuffer.length >= 2) {
        const len = pointBuffer.length;
        // Pad ends for Catmull-Rom (duplicate first/last)
        const p0 = pointBuffer[Math.max(0, len - 4)];
        const p1 = pointBuffer[Math.max(0, len - 3)];
        const p2 = pointBuffer[Math.max(0, len - 2)];
        const p3 = pointBuffer[len - 1];

        const subPoints = sampleSpline(p0, p1, p2, p3, SPLINE_STEPS);
        drawPencilSegment(subPoints, velocity);
      }

      lastX = x;
      lastY = y;
    }

    // ── Event listeners ───────────────────────────────────────────────────────

    window.addEventListener('mousemove', (e) => {
      handleDraw(e.clientX, e.clientY);
    });

    // Reset on mouse leave so next entry doesn't connect to old position
    window.addEventListener('mouseleave', () => {
      lastX = null;
      lastY = null;
      pointBuffer = [];
    });

    // Touch support
    canvas.addEventListener('touchmove', (e) => {
      e.preventDefault();
      const touch = e.touches[0];
      handleDraw(touch.clientX, touch.clientY);
    }, { passive: false });

    canvas.addEventListener('touchend', () => {
      lastX = null;
      lastY = null;
      pointBuffer = [];
    });

    canvas.addEventListener('touchstart', (e) => {
      e.preventDefault();
      const touch = e.touches[0];
      lastX = null;
      lastY = null;
      pointBuffer = [];
      handleDraw(touch.clientX, touch.clientY);
    }, { passive: false });
  </script>
</body>
</html>
